services:
  - type: web
    name: lockedsaver-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: DB_URI
        sync: false
      - key: DB_NAME
        value: SaveRestricted2
      - key: ADMINS
        sync: false
      - key: LOG_CHANNEL
        sync: false
      - key: ERROR_MESSAGE
        value: "true"